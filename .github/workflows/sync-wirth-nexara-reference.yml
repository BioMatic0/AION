name: Sync Wirth Nexara reference design

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-wirth-nexara-reference.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependency
        run: python -m pip install --disable-pip-version-check pillow

      - name: Copy exact reference design and apply requested changes
        env:
          REFERENCE_URL: https://wirth-nexara-view-v10.patrick-wirth.chatgpt.site/
          TARGET_DIR: wirth-nexara-vercel-v10
        run: |
          python - <<'PY'
          from __future__ import annotations

          import html as html_lib
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path
          from PIL import Image, ImageSequence

          reference = os.environ['REFERENCE_URL']
          target = Path(os.environ['TARGET_DIR'])
          target.mkdir(parents=True, exist_ok=True)

          request = urllib.request.Request(
              reference,
              headers={'User-Agent': 'Mozilla/5.0 Wirth-Nexara-Sync/1.0'},
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              source = response.read().decode('utf-8')

          # Copy local assets referenced by the exact source page so the design remains self-contained.
          asset_refs = set()
          for attr in ('src', 'href'):
              for match in re.finditer(rf'{attr}=["\']([^"\']+)["\']', source, flags=re.I):
                  value = html_lib.unescape(match.group(1)).strip()
                  if not value or value.startswith(('data:', '#', 'mailto:', 'tel:', 'javascript:')):
                      continue
                  parsed = urllib.parse.urlparse(value)
                  if parsed.scheme or parsed.netloc:
                      continue
                  path = parsed.path.lstrip('/')
                  if path.startswith('assets/'):
                      asset_refs.add(path)

          for relative in sorted(asset_refs):
              destination = target / relative
              destination.parent.mkdir(parents=True, exist_ok=True)
              asset_url = urllib.parse.urljoin(reference, relative)
              try:
                  req = urllib.request.Request(asset_url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60) as response:
                      destination.write_bytes(response.read())
              except Exception as exc:
                  print(f'Asset skipped: {relative}: {exc}')

          # Remove the black raster background from the animated homepage helix.
          helix_relative = Path('assets/nexara-7-infinity-helix-company-colors.gif')
          helix_path = target / helix_relative
          if helix_path.exists():
              image = Image.open(helix_path)
              frames = []
              durations = []
              for frame in ImageSequence.Iterator(image):
                  rgba = frame.convert('RGBA')
                  pixels = []
                  for red, green, blue, alpha in rgba.getdata():
                      luminance = max(red, green, blue)
                      if luminance <= 24:
                          pixels.append((red, green, blue, 0))
                      elif luminance < 54:
                          softened = int(alpha * (luminance - 24) / 30)
                          pixels.append((red, green, blue, softened))
                      else:
                          pixels.append((red, green, blue, alpha))
                  rgba.putdata(pixels)
                  frames.append(rgba)
                  durations.append(frame.info.get('duration', image.info.get('duration', 40)))

              if frames:
                  frames[0].save(
                      helix_path,
                      save_all=True,
                      append_images=frames[1:],
                      duration=durations,
                      loop=image.info.get('loop', 0),
                      disposal=2,
                      optimize=False,
                  )

          # Preserve the original design exactly and add only the requested functional overrides.
          override = r'''
          <style id="patrick-requested-overrides">
          :root{--patrick-site-scale:1.10}
          html{overflow-x:hidden}
          body{overflow-x:hidden;zoom:var(--patrick-site-scale);width:calc(100% / var(--patrick-site-scale));min-width:calc(100% / var(--patrick-site-scale))}
          @supports not (zoom:1.1){body{transform:scale(var(--patrick-site-scale));transform-origin:top left;width:calc(100% / var(--patrick-site-scale))}}
          #start.hero{min-height:calc(100svh / var(--patrick-site-scale));padding-top:110px;padding-bottom:34px;overflow:visible}
          #start .hero-grid{gap:34px}
          #start .hero-mark{min-height:410px;background:transparent!important}
          #start .v10-symbol-stage,#start .homepage-helix-display,#start .homepage-helix-image-shell,#start .homepage-custom-helix-frame{background:transparent!important}
          #start .homepage-helix-image{background:transparent!important}
          #start .hero-pillar-navigation{grid-column:1/-1;width:100%;margin-top:0;padding-bottom:2px;position:relative;z-index:4}
          #start .hero-pillar-buttons{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;width:100%}
          #start .hero-pillar-button{min-width:0}
          @media(max-width:980px){#start.hero{min-height:0;padding-top:108px}#start .hero-pillar-buttons{grid-template-columns:repeat(2,minmax(0,1fr))}}
          @media(max-width:560px){#start .hero-pillar-buttons{grid-template-columns:1fr}}
          </style>
          '''
          if '</head>' in source:
              source = source.replace('</head>', override + '</head>', 1)
          else:
              source = override + source

          (target / 'index.html').write_text(source, encoding='utf-8')
          print('Reference design synchronized with 110% scale, seven-pillar hero, and transparent helix.')
          PY

      - name: Commit synchronized page
        run: |
          git config user.name "Wirth Nexara Sync"
          git config user.email "actions@users.noreply.github.com"
          git add wirth-nexara-vercel-v10/index.html wirth-nexara-vercel-v10/assets
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Restore exact Wirth Nexara reference design [skip ci]"
            git push
          fi

name: Patch homepage 100 percent layout

on:
  push:
    paths:
      - ".github/workflows/patch-homepage-100-percent-layout.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Adjust homepage layout
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("wirth-nexara-vercel-v10/index.html")
          text = path.read_text(encoding="utf-8")

          text = text.replace(":root{--patrick-site-scale:1.10}", ":root{--patrick-site-scale:1.00}")
          text = text.replace(
              "#start.hero{min-height:calc(100svh / var(--patrick-site-scale));padding-top:110px;padding-bottom:34px;overflow:visible}",
              "#start.hero{min-height:100svh;padding-top:92px;padding-bottom:18px;overflow:visible}"
          )
          text = text.replace(
              "#start .hero-grid{gap:34px}",
              "#start .hero-grid{gap:28px;min-height:calc(100svh - 110px);grid-template-rows:minmax(0,1fr) auto;align-content:stretch;align-items:center}"
          )
          text = text.replace(
              "#start .hero-mark{min-height:410px;background:transparent!important}",
              "#start .hero-mark{min-height:450px;background:transparent!important}"
          )
          text = text.replace(
              "#start .hero-pillar-buttons{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;width:100%}",
              "#start .hero-pillar-buttons{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:9px;width:66.6667%;margin-inline:auto}"
          )
          text = text.replace(
              "@media(max-width:980px){#start.hero{min-height:0;padding-top:108px}#start .hero-pillar-buttons{grid-template-columns:repeat(2,minmax(0,1fr))}}",
              "@media(max-width:980px){#start.hero{min-height:0;padding-top:108px}#start .hero-grid{min-height:0;grid-template-rows:auto}#start .hero-pillar-buttons{grid-template-columns:repeat(2,minmax(0,1fr));width:100%}}"
          )

          marker = 'id="homepage-100-percent-refinement"'
          if marker not in text:
              css = '''\n<style id="homepage-100-percent-refinement">\n.site-header .brand-name{font-size:1.06rem;letter-spacing:.11em}\n.site-header .brand small{font-size:.68rem;letter-spacing:.135em}\n#start .hero-copy h1{font-size:clamp(3.4rem,7.7vw,7rem)!important}\n#start .hero-copy .lead{font-size:1.06rem}\n#start .hero-pillar-button{padding-inline:10px}\n@media(max-width:980px){#start .hero-copy h1{font-size:clamp(3rem,10vw,5.7rem)!important}}\n@media(max-width:560px){.site-header .brand-name{font-size:.96rem}.site-header .brand small{font-size:.61rem}}\n</style>\n'''
              text = text.replace("</head>", css + "</head>", 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "Wirth Nexara Automation"
          git config user.email "actions@users.noreply.github.com"
          git add wirth-nexara-vercel-v10/index.html
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Refine homepage for 100 percent scale"
          git push

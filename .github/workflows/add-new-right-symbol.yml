name: Add new right homepage symbol

on:
  push:
    paths:
      - ".github/workflows/add-new-right-symbol.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create transparent symbol and update homepage
        shell: bash
        run: |
          mkdir -p wirth-nexara-vercel-v10/assets
          cat > /tmp/symbol.b64 <<'B64'

B64
          base64 -d /tmp/symbol.b64 > wirth-nexara-vercel-v10/assets/wirth-nexara-7d-transparent.webp
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('wirth-nexara-vercel-v10/index.html')
          text = path.read_text(encoding='utf-8')

          # Remove the previous one-column-only override while keeping the old symbol hidden.
          text = text.replace('#start .hero-grid{grid-template-columns:minmax(0,1fr)!important}', '#start .hero-grid{grid-template-columns:minmax(0,1.08fr) minmax(360px,.92fr)!important}')
          text = text.replace('#start .hero-pillar-navigation{grid-column:1!important}', '#start .hero-pillar-navigation{grid-column:1/-1!important}')

          marker = '<div class="hero-right-symbol reveal" aria-label="Rotierendes Wirth-NeXara-7D-Symbol">'
          if marker not in text:
              anchor = '</div>\n<div aria-label="Direktnavigation zu den sieben Säulen" class="hero-pillar-navigation reveal">'
              insert = '''</div>\n<div class="hero-right-symbol reveal" aria-label="Rotierendes Wirth-NeXara-7D-Symbol">\n<img src="assets/wirth-nexara-7d-transparent.webp" alt="Wirth NeXara 7D Symbol"/>\n</div>\n<div aria-label="Direktnavigation zu den sieben Säulen" class="hero-pillar-navigation reveal">'''
              if anchor not in text:
                  raise SystemExit('Hero insertion point not found')
              text = text.replace(anchor, insert, 1)

          css_marker = 'id="new-right-homepage-symbol"'
          if css_marker not in text:
              css = '''\n<style id="new-right-homepage-symbol">\n#start .hero-grid{grid-template-columns:minmax(0,1.08fr) minmax(360px,.92fr)!important;align-items:center}\n#start .hero-copy{max-width:820px}\n#start .hero-right-symbol{min-height:470px;display:grid;place-items:center;position:relative;isolation:isolate;background:transparent!important;overflow:visible}\n#start .hero-right-symbol::before{content:"";position:absolute;width:78%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(213,172,93,.10),rgba(167,100,214,.06) 35%,transparent 70%);filter:blur(18px);pointer-events:none}\n#start .hero-right-symbol img{position:relative;z-index:1;width:min(92%,560px);height:auto;display:block;background:transparent!important;filter:drop-shadow(0 0 22px rgba(238,177,255,.20)) drop-shadow(0 0 36px rgba(213,172,93,.14));transform-origin:50% 50%;animation:nexara7dSlowRotation 48s linear infinite;will-change:transform}\n#start .hero-pillar-navigation{grid-column:1/-1!important}\n@keyframes nexara7dSlowRotation{from{transform:rotate(0deg) scale(.985)}to{transform:rotate(360deg) scale(.985)}}\n@media(max-width:980px){#start .hero-grid{grid-template-columns:1fr!important}#start .hero-right-symbol{min-height:360px}#start .hero-right-symbol img{width:min(82%,470px)}}\n@media(max-width:560px){#start .hero-right-symbol{min-height:285px}#start .hero-right-symbol img{width:min(90%,360px)}}\n@media(prefers-reduced-motion:reduce){#start .hero-right-symbol img{animation-duration:1ms;animation-iteration-count:1}}\n</style>\n'''
              text = text.replace('</head>', css + '</head>', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit change
        shell: bash
        run: |
          git config user.name "Wirth Nexara Automation"
          git config user.email "actions@users.noreply.github.com"
          git add wirth-nexara-vercel-v10/index.html wirth-nexara-vercel-v10/assets/wirth-nexara-7d-transparent.webp
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Add transparent slow-rotating 7D homepage symbol"
          git push

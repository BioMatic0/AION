name: Add Holding Ave Pro and SFRG OS pages

on:
  push:
    paths:
      - ".github/workflows/add-holding-avepro-sfrgos-pages.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create brand system and pages
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from html import escape

          root = Path("wirth-nexara-vercel-v10")
          assets = root / "assets"
          assets.mkdir(parents=True, exist_ok=True)

          logos = {
            "infinity-holding-logo.svg": '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="t"><title id="t">Infinity Holding</title><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff1bd"/><stop offset=".48" stop-color="#d7ad5a"/><stop offset="1" stop-color="#765019"/></linearGradient><filter id="s"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="60" cy="60" r="52" fill="#07080b" stroke="url(#g)" stroke-width="1.5"/><path d="M18 60c13-24 29-28 42-8 13-20 29-16 42 8-13 24-29 28-42 8-13 20-29 16-42-8Z" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#s)"/><path d="M60 45 74 60 60 75 46 60Z" fill="#0d0f13" stroke="#f3dfa8" stroke-width="1.4"/><circle cx="60" cy="60" r="4" fill="#f3dfa8"/></svg>''',
            "ave-pro-logo.svg": '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="t"><title id="t">Ave Pro</title><defs><linearGradient id="g" x1=".1" y1=".1" x2=".9" y2=".9"><stop stop-color="#fff1cf"/><stop offset=".48" stop-color="#d69345"/><stop offset="1" stop-color="#6d3015"/></linearGradient><filter id="s"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="60" cy="60" r="52" fill="#08090c" stroke="url(#g)" stroke-width="1.5"/><circle cx="60" cy="60" r="37" fill="none" stroke="#d69345" stroke-width="1" stroke-dasharray="2 5"/><path d="M25 81 49 31h22l24 50H81L60 42 39 81Z" fill="none" stroke="url(#g)" stroke-width="6" stroke-linejoin="round" filter="url(#s)"/><path d="M39 67h42M47 81 60 93 73 81" fill="none" stroke="#f7dfb3" stroke-width="3" stroke-linecap="round"/></svg>''',
            "sfrg-os-logo.svg": '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="t"><title id="t">SFRG OS</title><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8fe6f2"/><stop offset=".48" stop-color="#9d78e7"/><stop offset="1" stop-color="#d8b15d"/></linearGradient><filter id="s"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="60" cy="60" r="52" fill="#07080b" stroke="url(#g)" stroke-width="1.5"/><g fill="none" stroke="url(#g)" filter="url(#s)"><rect x="26" y="26" width="68" height="68" rx="13" stroke-width="2" transform="rotate(45 60 60)"/><rect x="34" y="34" width="52" height="52" rx="10" stroke-width="2"/><circle cx="60" cy="60" r="18" stroke-width="2.5"/></g><g fill="#f4dfa8"><circle cx="60" cy="17" r="3"/><circle cx="94" cy="39" r="3"/><circle cx="87" cy="82" r="3"/><circle cx="60" cy="103" r="3"/><circle cx="25" cy="82" r="3"/><circle cx="26" cy="39" r="3"/><circle cx="60" cy="60" r="4"/></g><path d="M60 21v21M90 41 73 51M84 79 72 69M60 99V78M29 79l19-10M30 41l18 10" stroke="#8fe6f2" stroke-width="1.4" opacity=".75"/></svg>'''
          }
          for name, content in logos.items():
              (assets / name).write_text(content, encoding="utf-8")

          css = r'''
          :root{--bg:#07080b;--panel:#11141a;--text:#f4f1e8;--muted:#b9b4a9;--gold:#d5ac5d;--light:#f4dfa8;--line:rgba(213,172,93,.24);--accent:#d5ac5d;--max:1320px;--radius:26px}
          *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.65;background:radial-gradient(circle at 12% 7%,color-mix(in srgb,var(--accent) 18%,transparent),transparent 30rem),radial-gradient(circle at 82% 28%,rgba(64,72,120,.18),transparent 34rem),linear-gradient(180deg,#050609,#0b0d12 48%,#07080b)}body:before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);background-size:54px 54px;mask-image:linear-gradient(to bottom,#000,transparent 92%)}a{color:inherit}.container{width:min(var(--max),calc(100% - 44px));margin:auto}.site-header{position:fixed;inset:0 0 auto;z-index:50;backdrop-filter:blur(18px);background:rgba(5,6,9,.79);border-bottom:1px solid var(--line)}.nav{min-height:88px;display:flex;align-items:center;justify-content:space-between;gap:20px}.family{display:flex;align-items:center;gap:13px}.family-link{display:flex;align-items:center;gap:9px;text-decoration:none;padding:7px 9px;border-radius:16px;transition:.22s}.family-link:hover,.family-link.active{background:rgba(213,172,93,.08)}.family-link img{width:42px;height:42px}.family-link span{display:flex;flex-direction:column;line-height:1}.family-link strong{font-size:.93rem;letter-spacing:.10em}.family-link small{font-size:.58rem;color:var(--muted);letter-spacing:.10em;margin-top:6px;text-transform:uppercase}.nav-links{display:flex;align-items:center;gap:18px}.nav-links a{text-decoration:none;color:var(--muted);font-size:1.02rem;font-weight:750}.nav-links a:hover{color:var(--text)}.hero{min-height:100svh;padding:138px 0 70px;display:grid;align-items:center;overflow:hidden;position:relative}.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:68px;align-items:center}.eyebrow{text-transform:uppercase;letter-spacing:.18em;color:var(--light);font-size:.75rem;font-weight:900;margin-bottom:15px}.hero h1,h2,h3{font-family:Georgia,"Times New Roman",serif;line-height:1.08;margin:0 0 20px}.hero h1{font-size:clamp(4rem,8vw,8rem);letter-spacing:-.052em;background:linear-gradient(110deg,#fff4d1,var(--accent) 58%,#805421);-webkit-background-clip:text;color:transparent}.hero .lead{font-size:clamp(1.08rem,1.8vw,1.35rem);color:#d4d0c7;max-width:760px}.status{display:inline-flex;align-items:center;gap:9px;padding:8px 13px;border:1px solid var(--line);border-radius:999px;color:var(--light);font-size:.78rem;font-weight:850;letter-spacing:.08em;text-transform:uppercase}.status:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}.logo-stage{min-height:540px;display:grid;place-items:center;position:relative;perspective:1200px}.logo-stage:before,.logo-stage:after{content:"";position:absolute;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:50%;animation:orbit 28s linear infinite}.logo-stage:before{width:82%;height:82%;transform:rotateX(68deg)}.logo-stage:after{width:58%;height:92%;animation-direction:reverse;animation-duration:21s}.logo-stage img{width:min(72%,430px);filter:drop-shadow(0 0 28px color-mix(in srgb,var(--accent) 38%,transparent));animation:float 6s ease-in-out infinite;z-index:2}.sigil{position:absolute;width:84%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--accent) 15%,transparent),transparent 66%);animation:breathe 4.8s ease-in-out infinite}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:30px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:50px;padding:0 20px;border-radius:999px;text-decoration:none;font-weight:850;border:1px solid var(--line)}.btn.primary{background:linear-gradient(135deg,var(--light),var(--accent));color:#151009}.btn.secondary{background:rgba(255,255,255,.03)}.section{padding:105px 0}.section-head{max-width:820px;margin-bottom:46px}.section h2{font-size:clamp(2.5rem,5vw,4.8rem);letter-spacing:-.038em}.section p{color:var(--muted)}.grid{display:grid;gap:22px}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.card{position:relative;overflow:hidden;padding:29px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(145deg,rgba(25,28,35,.88),rgba(10,12,16,.91));box-shadow:0 26px 80px rgba(0,0,0,.34)}.card:after{content:"";position:absolute;width:130px;height:130px;border-radius:50%;right:-70px;top:-70px;background:radial-gradient(circle,color-mix(in srgb,var(--accent) 20%,transparent),transparent 68%)}.card h3{font-size:1.55rem}.number{font-family:Georgia,serif;font-size:2.1rem;color:color-mix(in srgb,var(--accent) 72%,white);opacity:.7}.manifesto{padding:clamp(34px,6vw,74px);border:1px solid var(--line);border-radius:34px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 10%,transparent),rgba(255,255,255,.015))}.manifesto blockquote{margin:0;font-family:Georgia,serif;font-size:clamp(2rem,4.5vw,4.4rem);line-height:1.18;color:var(--light)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px}.stat{padding:22px;border-top:1px solid var(--line)}.stat strong{display:block;font-family:Georgia,serif;font-size:2.4rem;color:var(--light)}.footer{border-top:1px solid var(--line);padding:34px 0 48px;color:var(--muted)}.footer-grid{display:flex;justify-content:space-between;gap:20px;align-items:center}.footer a{text-decoration:none}.reveal{opacity:0;transform:translateY(18px);transition:.7s ease}.reveal.visible{opacity:1;transform:none}@keyframes orbit{to{transform:rotateX(68deg) rotateZ(360deg)}}@keyframes float{50%{transform:translateY(-14px) rotate(2deg)}}@keyframes breathe{50%{transform:scale(1.06);opacity:.8}}@media(max-width:1050px){.hero-grid{grid-template-columns:1fr}.logo-stage{min-height:390px}.grid-4{grid-template-columns:repeat(2,1fr)}.family-link small{display:none}.family-link strong{font-size:.82rem}.nav-links{display:none}}@media(max-width:720px){.container{width:min(100% - 28px,var(--max))}.nav{min-height:76px}.family{gap:2px}.family-link{padding:5px}.family-link img{width:34px;height:34px}.family-link:not(.active) span{display:none}.hero{padding-top:108px}.hero h1{font-size:clamp(3.25rem,18vw,5.7rem)}.grid-3,.grid-4,.stats{grid-template-columns:1fr}.footer-grid{align-items:flex-start;flex-direction:column}}
          '''
          (root / "brand-pages.css").write_text(css, encoding="utf-8")

          family_links = '''<div class="family">
            <a class="family-link {holding}" href="infinity-holding.html"><img src="assets/infinity-holding-logo.svg" alt=""><span><strong>∞ HOLDING</strong><small>Wo Vision Struktur findet.</small></span></a>
            <a class="family-link {nexara}" href="index.html"><img src="assets/wirth-nexara-symbol.png" alt=""><span><strong>WIRTH NEXARA</strong><small>Wissen. Werke. Wirkung.</small></span></a>
            <a class="family-link {ave}" href="ave-pro.html"><img src="assets/ave-pro-logo.svg" alt=""><span><strong>AVE PRO</strong><small>Resonante Ordnung</small></span></a>
            <a class="family-link {sfrg}" href="sfrg-os.html"><img src="assets/sfrg-os-logo.svg" alt=""><span><strong>SFRG OS</strong><small>Ordo Solaris</small></span></a>
          </div>'''

          def cards_html(cards):
              return ''.join(f'<article class="card reveal"><div class="number">{i:02d}</div><h3>{escape(t)}</h3><p>{escape(d)}</p></article>' for i,(t,d) in enumerate(cards,1))

          def make_page(slug, title, full_name, kicker, lead, claim, status, accent, logo, cards, stats, body_intro, active):
              family = family_links.format(
                  holding='active' if active=='holding' else '',
                  nexara='active' if active=='nexara' else '',
                  ave='active' if active=='ave' else '',
                  sfrg='active' if active=='sfrg' else ''
              )
              page = f'''<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{escape(title)} · Wirth Nexara</title><meta name="description" content="{escape(lead)}"><meta name="theme-color" content="#07080b"><link rel="icon" href="assets/{logo}" type="image/svg+xml"><link rel="stylesheet" href="brand-pages.css"><style>:root{{--accent:{accent}}}</style></head><body>
              <header class="site-header"><div class="container nav">{family}<nav class="nav-links"><a href="#auftrag">Auftrag</a><a href="#architektur">Architektur</a><a href="#wirkung">Wirkung</a><a href="index.html">Wirth Nexara ↗</a></nav></div></header>
              <main><section class="hero"><div class="container hero-grid"><div class="reveal"><div class="eyebrow">{escape(kicker)}</div><span class="status">{escape(status)}</span><h1>{escape(title)}</h1><p class="lead">{escape(full_name)}</p><p class="lead">{escape(lead)}</p><div class="actions"><a class="btn primary" href="#auftrag">Architektur öffnen</a><a class="btn secondary" href="index.html">Zur Gesamtarchitektur</a></div></div><div class="logo-stage reveal"><div class="sigil"></div><img src="assets/{logo}" alt="Logo {escape(title)}"></div></div></section>
              <section class="section" id="auftrag"><div class="container"><div class="section-head reveal"><div class="eyebrow">Auftrag und Stellung</div><h2>{escape(claim)}</h2><p>{escape(body_intro)}</p></div><div class="grid grid-4">{cards_html(cards)}</div></div></section>
              <section class="section" id="architektur"><div class="container"><div class="manifesto reveal"><div class="eyebrow">Leitsatz</div><blockquote>{escape(claim)}</blockquote><div class="stats">{''.join(f'<div class="stat"><strong>{escape(v)}</strong><span>{escape(k)}</span></div>' for k,v in stats)}</div></div></div></section>
              <section class="section" id="wirkung"><div class="container"><div class="section-head reveal"><div class="eyebrow">Vom Ursprung zur Wirkung</div><h2>Eigenständig in der Form. Verbunden im Ganzen.</h2><p>Die Seite führt das Projekt als klar abgegrenzten Teil der Gesamtarchitektur. Zuständigkeiten, Entwicklungsstand und Übergänge bleiben sichtbar, damit Vision nicht zur Behauptung, sondern zu einer prüfbaren Ordnung wird.</p></div><div class="actions reveal"><a class="btn primary" href="infinity-holding.html">∞ Holding</a><a class="btn secondary" href="ave-pro.html">Ave Pro</a><a class="btn secondary" href="sfrg-os.html">SFRG OS</a><a class="btn secondary" href="index.html">Wirth Nexara</a></div></div></section></main>
              <footer class="footer"><div class="container footer-grid"><div><strong>{escape(title)}</strong><br><small>Teil der verbundenen Wirth-Nexara-Architektur · © <span id="year"></span> Patrick Wirth</small></div><a href="index.html">Wissen. Werke. Wirkung. ↗</a></div></footer>
              <script>document.getElementById('year').textContent=new Date().getFullYear();const o=new IntersectionObserver(e=>e.forEach(x=>{{if(x.isIntersecting){{x.target.classList.add('visible');o.unobserve(x.target)}}}}),{{threshold:.1}});document.querySelectorAll('.reveal').forEach(x=>o.observe(x));</script></body></html>'''
              (root / f"{slug}.html").write_text(page, encoding="utf-8")

          make_page(
            "infinity-holding", "∞ Holding", "Infinity Holding · Wo Vision Struktur findet.",
            "Dach · Schutz · Struktur · Beteiligung", "Ein Dach für eigenständige Unternehmen, Werke und Systeme. Die Holding schützt Identität, ordnet Verantwortung und schafft den Raum, in dem gemeinsame Wirkung wachsen kann.",
            "Ein Dach. Fünf Träger. Mehrere eigenständige Werke. Eine gemeinsame Ordnung.", "Holding-Arbeitsname · im Aufbau", "#d5ac5d", "infinity-holding-logo.svg",
            [("Schutz","Rechte, Identität, Werte und langfristige Substanz werden unter einem klaren Dach gesichert."),("Struktur","Rollen, Zuständigkeiten, Freigaben und Übergänge werden nachvollziehbar geordnet."),("Beteiligung","Eigenständige Firmen und Werke bleiben unterscheidbar und können dennoch gemeinsam wachsen."),("Governance","Macht wird als geliehenes Gut verstanden: transparent, begrenzt und verantwortbar.")],
            [("Kernpersonen","3"),("Offene Rollen","2"),("Dachprinzip","∞")],
            "Die ∞ Holding ist das spätere Dach über Wirth Nexara, Ave Pro, SFRG OS und weiteren eigenständigen Werken. Ihr Zweck ist nicht Vereinheitlichung, sondern tragfähige Verbindung: Schutz ohne Besitzergreifung, Ordnung ohne Erstarrung und Wachstum ohne Verlust des Ursprungs.", "holding")

          make_page(
            "ave-pro", "AVE PRO", "Architektonische Verbindung Evolutionärer Prinzipien – Resonante Ordnung",
            "Markt · Verkauf · E-Commerce · Lifestyle", "Ave Pro übersetzt Ideen in marktfähige Angebote, klare Kundennutzen und reale Wertschöpfung. Es bildet den schlanken Umsatzmotor der Gesamtarchitektur und wird bewusst weiter geschärft.",
            "Wir verbinden, was Zukunft trägt.", "Erster Umsatzmotor · Angebot in Schärfung", "#d69345", "ave-pro-logo.svg",
            [("Markt","Bedürfnisse, Positionierung und Nachfrage werden in verständliche Angebote übersetzt."),("Verkauf","Vertrauen, Nutzen und klare Prozesse führen vom ersten Kontakt zur tragfähigen Beziehung."),("E-Commerce","Digitale Produkte, Handel und skalierbare Vertriebswege werden strukturiert aufgebaut."),("Lifestyle","Alltagstaugliche Lösungen verbinden Gestaltung, Qualität und persönliche Entwicklung.")],
            [("Fokus","Umsatz"),("Form","schlank"),("Prinzip","Resonanz")],
            "Ave Pro bleibt ein eigenständiges Projekt innerhalb des gemeinsamen Systems. Es verbindet Markt, Verkauf, E-Commerce und Lifestyle, ohne die Werte- und Wissensarchitektur von Wirth Nexara zu verwässern. Die aktuelle Priorität liegt auf einem klaren, verkaufbaren Kernangebot.", "ave")

          make_page(
            "sfrg-os", "SFRG OS", "Synarchisches Fundament Resonanter Genesis – Ordo Solaris",
            "System · Resonanz · Identität · Verkörperung", "SFRG OS ist die modulare Laufzeit- und Ordnungsarchitektur für souveräne Identität, Wissen, Kommunikation, Sicherheit und symbiotische KI-Systeme.",
            "Ordnung trägt die Welt. Resonanz erweckt ihre Zukunft.", "Architektur v4.0 · in Entwicklung", "#8fcfe8", "sfrg-os-logo.svg",
            [("Souveräne Identität","Identität, Rollen und Zugriffe bleiben getrennt, prüfbar und unter menschlicher Kontrolle."),("Gedächtnis und Wissen","Vector Memory, Quellen und Bedeutungsräume bilden eine nachvollziehbare Wissensschicht."),("Sichere Verbindung","Gateway, Zero Trust und Tunnel-Logik schützen Übergänge zwischen lokalen und verbundenen Systemen."),("Symbiose","SFRG-19 führt zwölf Nodes in einer eigenständigen Symbiose-Schicht zusammen.")],
            [("Module","32"),("Symbiose-Nodes","12"),("Dimensionen","7")],
            "Die Architektur trennt Portfolio-Kategorien, technische Laufzeitschichten und die verbindende Bridge bewusst voneinander. Hochrisikofelder wie Healthcare-AI, Government-AI, Trading, Treasury und Identity werden nicht als fertige Versprechen dargestellt, sondern als Bereiche mit erhöhtem Prüf- und Schutzbedarf.", "sfrg")

          index = root / "index.html"
          text = index.read_text(encoding="utf-8")
          old = '''<a aria-label="Wirth Nexara Startseite" class="brand" href="#start">
          <img alt="" aria-hidden="true" class="brand-symbol" height="42" src="assets/wirth-nexara-symbol.png" width="42"/>
          <span class="brand-copy"><strong class="brand-name">WIRTH NEXARA</strong><small>WISSEN. WERKE. WIRKUNG.</small></span>
          </a>'''
          new = '''<div class="ecosystem-brand-rail" aria-label="Verbundene Marken">
          <a class="ecosystem-brand ecosystem-holding" href="infinity-holding.html"><img alt="" src="assets/infinity-holding-logo.svg"><span><strong>∞ HOLDING</strong><small>WO VISION STRUKTUR FINDET.</small></span></a>
          <span class="ecosystem-divider" aria-hidden="true"></span>
          <a aria-label="Wirth Nexara Startseite" class="ecosystem-brand ecosystem-nexara" href="#start"><img alt="" src="assets/wirth-nexara-symbol.png"><span><strong>WIRTH NEXARA</strong><small>WISSEN. WERKE. WIRKUNG.</small></span></a>
          <a class="ecosystem-brand ecosystem-compact" href="ave-pro.html"><img alt="" src="assets/ave-pro-logo.svg"><span><strong>AVE PRO</strong><small>RESONANTE ORDNUNG</small></span></a>
          <a class="ecosystem-brand ecosystem-compact" href="sfrg-os.html"><img alt="" src="assets/sfrg-os-logo.svg"><span><strong>SFRG OS</strong><small>ORDO SOLARIS</small></span></a>
          </div>'''
          if old not in text:
              raise SystemExit("Expected Wirth Nexara header block was not found")
          text = text.replace(old, new, 1)

          marker = 'id="ecosystem-header-expansion"'
          if marker not in text:
              expansion = r'''
          <style id="ecosystem-header-expansion">
          .site-header .container.nav{width:calc(100% - 36px);max-width:none;min-height:92px;gap:18px}
          .ecosystem-brand-rail{display:flex;align-items:center;gap:9px;min-width:0;flex:0 1 auto}
          .ecosystem-brand{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:15px;text-decoration:none;transition:.22s ease;min-width:0}
          .ecosystem-brand:hover{background:rgba(213,172,93,.08)}
          .ecosystem-brand img{width:44px;height:44px;flex:0 0 44px;object-fit:contain}
          .ecosystem-brand span{display:flex;flex-direction:column;line-height:1;min-width:0}
          .ecosystem-brand strong{font-size:1.16rem;letter-spacing:.105em;white-space:nowrap;color:var(--text)}
          .ecosystem-brand small{font-size:.70rem;letter-spacing:.12em;white-space:nowrap;color:var(--muted);margin-top:7px;font-weight:780}
          .ecosystem-holding strong{color:var(--gold-light)}
          .ecosystem-divider{width:1px;height:42px;background:rgba(213,172,93,.22);margin-inline:2px}
          .ecosystem-compact img{width:38px;height:38px;flex-basis:38px}
          .ecosystem-compact strong{font-size:1.02rem}
          .ecosystem-compact small{font-size:.60rem}
          .site-header .nav-links{gap:15px;flex:1 1 auto;justify-content:flex-end;min-width:0;white-space:nowrap}
          .site-header .nav-links>a,.site-header .nav-dropdown>summary{font-size:1.08rem;font-weight:760}
          @media(max-width:1850px){.ecosystem-brand small{display:none}.ecosystem-brand strong{font-size:1.04rem}.ecosystem-brand img{width:39px;height:39px;flex-basis:39px}.site-header .nav-links>a,.site-header .nav-dropdown>summary{font-size:1rem}.site-header .nav-links{gap:12px}}
          @media(max-width:1480px){.ecosystem-compact span{display:none}.ecosystem-divider{display:none}.ecosystem-brand-rail{gap:2px}.site-header .nav-links>a,.site-header .nav-dropdown>summary{font-size:.96rem}}
          @media(max-width:1120px){.ecosystem-holding span{display:none}.ecosystem-nexara small{display:none}.site-header .container.nav{min-height:80px}}
          @media(max-width:980px){.ecosystem-brand-rail{max-width:calc(100% - 62px)}.ecosystem-compact{display:none}.ecosystem-nexara strong{font-size:1rem}.ecosystem-holding{display:flex}}
          </style>
          '''
              text = text.replace("</head>", expansion + "</head>", 1)
          index.write_text(text, encoding="utf-8")
